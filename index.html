<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.12);
      --text: #f0f0f0;
      --muted: #666;
      --success: #00e5a0;
      --error: #ff4f4f;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .card-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
    }

    .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid var(--accent);
      border-radius: 2px;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .card-body { padding: 2rem; }

    .endpoint-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 13px;
    }

    .method {
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .url { color: var(--muted); flex: 1; }
    .url span { color: var(--text); }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.6rem 1rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 2px;
      padding: 0.6rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .response-block {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-height: 120px;
      transition: border-color 0.2s;
    }

    .response-block.ok   { border-color: var(--success); }
    .response-block.fail { border-color: var(--error); }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 6px;
      transition: background 0.3s;
    }

    .ok   .status-dot { background: var(--success); }
    .fail .status-dot { background: var(--error); }

    .status-code { color: var(--muted); }
    .ok   .status-code { color: var(--success); }
    .fail .status-code { color: var(--error); }

    pre {
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
    }

    pre.loaded { color: var(--text); }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
    }

    .hint { display: flex; align-items: center; gap: 6px; }
    .dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="badge">Vercel Serverless</div>
      <h1>API <span>Tester</span></h1>
    </div>

    <div class="card-body">
      <div class="endpoint-row">
        <span class="method">GET</span>
        <span class="url">/api/<span>hello</span>?name=<span id="url-preview">...</span></span>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="name-input"
          placeholder="Vul je naam in (optioneel)"
          maxlength="40"
          oninput="document.getElementById('url-preview').textContent = this.value || '...'"
        />
        <button id="btn" onclick="callApi()">Verstuur</button>
      </div>

      <div class="response-block" id="response-block">
        <div class="response-header">
          <span><span class="status-dot"></span>Response</span>
          <span class="status-code" id="status-label">—</span>
          <div class="spinner" id="spinner"></div>
        </div>
        <pre id="output">Nog geen request verstuurd.</pre>
      </div>
    </div>

    <div class="card-footer">
      <div class="hint"><div class="dot"></div> /api/hello.js</div>
      <div class="hint"><div class="dot"></div> Serverless function</div>
      <div class="hint"><div class="dot"></div> JSON response</div>
    </div>
  </div>

  <script>
    async function callApi() {
      const name  = document.getElementById('name-input').value.trim();
      const btn   = document.getElementById('btn');
      const out   = document.getElementById('output');
      const block = document.getElementById('response-block');
      const spin  = document.getElementById('spinner');
      const lbl   = document.getElementById('status-label');

      const url = '/api/hello' + (name ? `?name=${encodeURIComponent(name)}` : '');

      btn.disabled = true;
      spin.style.display = 'block';
      out.className = '';
      out.textContent = 'Laden...';
      block.className = 'response-block';
      lbl.textContent = '...';

      try {
        const res  = await fetch(url);
        const data = await res.json();

        block.className = 'response-block ok';
        lbl.textContent = res.status + ' OK';
        out.className = 'loaded';
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        block.className = 'response-block fail';
        lbl.textContent = 'Fout';
        out.textContent = 'Kon de API niet bereiken.\n\n' + err.message;
      } finally {
        btn.disabled = false;
        spin.style.display = 'none';
      }
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') callApi();
    });
  </script>
</body>
</html>
