<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTD Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --text: #e8e8f0; --muted: #5a5a7a; --pos: #4ade80; --neg: #f87171;
      --accent: #60a5fa;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem; }
    nav { display: flex; gap: 0.75rem; margin-bottom: 2rem; align-items: center; }
    nav a { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; }
    nav a:hover { color: var(--text); border-color: var(--muted); }
    nav a.active { color: var(--text); border-color: var(--accent); background: rgba(96,165,250,0.1); }
    header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; }
    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
    .sub { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); }
    .charts-row { display: grid; grid-template-columns: 1fr 1.8fr; gap: 1.25rem; align-items: start; }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .chart-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    canvas { width: 100% !important; }
    .time-filters { display: flex; gap: 4px; }
    .tf { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .tf:hover { color: var(--text); border-color: var(--muted); }
    .tf.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; font-weight: 600; }
    .loading { text-align: center; padding: 4rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.85rem; }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .error { color: #f87171; font-family: 'DM Mono', monospace; font-size: 13px; padding: 2rem; text-align: center; }
    .legend { display: flex; flex-wrap: wrap; gap: 0.6rem 1.2rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); cursor: pointer; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: opacity 0.2s; }
    @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="active">📊 YTD Dashboard</a>
    <a href="/macro.html">🌍 Macro</a>
    <a href="/sector.html">🔄 Sector Rotatie</a>
    <a href="/crypto.html">₿ Crypto</a>
    <a href="/metals.html">🥇 Edelmetalen</a>
    <a href="/commodities.html">⚡ Grondstoffen</a>
  </nav>
  <header>
    <h1>YTD Dashboard</h1>
    <span class="sub" id="year-label"></span>
  </header>
  <div id="content">
    <div class="loading">Data laden<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>
  <script>
    document.getElementById("year-label").textContent = new Date().getFullYear() + " year-to-date";

    const PALETTE = [
      "#60a5fa","#4ade80","#fbbf24","#f472b6","#a78bfa",
      "#fb923c","#22d3ee","#e879f9","#f87171","#34d399",
      "#facc15","#38bdf8","#c084fc","#86efac","#fca5a5",
      "#6ee7b7","#fdba74"
    ];

    const PERIODS = [
      { label: "1W", days: 7 },
      { label: "1M", days: 30 },
      { label: "3M", days: 90 },
      { label: "6M", days: 180 },
      { label: "YTD", days: null },
      { label: "1J",  days: 365 },
      { label: "2J",  days: 730 },
      { label: "5J",  days: 1825 },
    ];

    let activePeriod = "1J";
    let lineChartInstance = null;
    let allWeeks = [];
    let rawDatasets = [];

    function getWeekKey(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const mon = new Date(d.setDate(diff));
      return mon.toISOString().slice(0, 10);
    }

    function getCutoffDate(period) {
      const now = new Date();
      if (period.label === "YTD") return new Date(now.getFullYear(), 0, 1).toISOString().slice(0, 10);
      const cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - period.days);
      return cutoff.toISOString().slice(0, 10);
    }

    function rebaseFromCutoff(weeks, datasets, cutoff) {
      const startIdx = weeks.findIndex(w => w >= cutoff);
      if (startIdx === -1) return { labels: weeks, rebased: datasets };
      const labels = weeks.slice(startIdx);
      const rebased = datasets.map(ds => {
        const sliced = ds.data.slice(startIdx);
        const firstVal = sliced.find(v => v !== null);
        if (firstVal === undefined) return { ...ds, data: sliced };
        return {
          ...ds,
          data: sliced.map(v => v !== null ? parseFloat((v - firstVal).toFixed(2)) : null)
        };
      });
      return { labels, rebased };
    }

    function updateLineChart(period) {
      activePeriod = period.label;
      document.querySelectorAll(".tf").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.period === period.label);
      });
      const cutoff = getCutoffDate(period);
      const { labels, rebased } = rebaseFromCutoff(allWeeks, rawDatasets, cutoff);
      lineChartInstance.data.labels = labels;
      lineChartInstance.data.datasets.forEach((ds, i) => { ds.data = rebased[i].data; });
      lineChartInstance.update();
    }

    function niceStep(range) {
      const rough = range / 8;
      const mag = Math.pow(10, Math.floor(Math.log10(rough)));
      const norm = rough / mag;
      let step;
      if (norm < 1.5) step = 1;
      else if (norm < 3) step = 2;
      else if (norm < 7) step = 5;
      else step = 10;
      return step * mag;
    }

    async function load() {
      try {
        const res  = await fetch("/api/finance");
        const json = await res.json();
        if (!json.ok) throw new Error(json.error);
        render(json.data);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="error">Kon data niet laden: ${err.message}</div>`;
      }
    }

    function render(data) {
      document.getElementById("content").innerHTML = `
        <div class="charts-row">
          <div class="chart-wrap">
            <div class="chart-top">
              <div class="chart-label">YTD % — <span id="current-year"></span></div>
            </div>
            <canvas id="bar-chart"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-top">
              <div class="chart-label">Historisch %</div>
              <div class="time-filters" id="time-filters"></div>
            </div>
            <canvas id="line-chart"></canvas>
            <div class="legend" id="legend"></div>
          </div>
        </div>
      `;
      document.getElementById("current-year").textContent = new Date().getFullYear();

      const filtersEl = document.getElementById("time-filters");
      filtersEl.innerHTML = PERIODS.map(p => `
        <button class="tf ${p.label === activePeriod ? "active" : ""}" data-period="${p.label}">${p.label}</button>
      `).join("");

      const sorted = [...data]
        .map(d => ({ name: d.name, pct: d.ytd[d.ytd.length - 1]?.pct ?? 0 }))
        .sort((a, b) => a.pct - b.pct);
      const barLabels = sorted.map(d => d.name);
      const barValues = sorted.map(d => d.pct);
      const barColors = barValues.map(v => v >= 0 ? "#4ade80" : "#f87171");
      const minVal = Math.min(...barValues);
      const maxVal = Math.max(...barValues);
      const range  = maxVal - minVal || 10;
      const step   = niceStep(range);
      const yMin   = Math.floor(minVal / step) * step;
      const yMax   = Math.ceil(maxVal / step) * step;

      new Chart(document.getElementById("bar-chart"), {
        type: "bar",
        data: { labels: barLabels, datasets: [{ data: barValues, backgroundColor: barColors, borderRadius: 4, borderSkipped: false }] },
        options: {
          indexAxis: "y", responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: "#12121a", borderColor: "#1e1e2e", borderWidth: 1, titleColor: "#5a5a7a", bodyColor: "#e8e8f0", callbacks: { label: ctx => ` ${ctx.parsed.x >= 0 ? "+" : ""}${ctx.parsed.x.toFixed(2)}%` } }
          },
          scales: {
            x: { min: yMin, max: yMax, grid: { color: "#1e1e2e" }, ticks: { stepSize: step, color: "#5a5a7a", font: { family: "DM Mono", size: 11 }, callback: v => (v >= 0 ? "+" : "") + v.toFixed(0) + "%" } },
            y: { grid: { color: "transparent" }, ticks: { color: "#e8e8f0", font: { family: "DM Sans", size: 11 } } }
          }
        }
      });

      const weekMaps = data.map(({ hist }) => {
        const map = {};
        hist.forEach(p => { map[getWeekKey(p.date)] = p.pct; });
        return map;
      });
      allWeeks = [...new Set(weekMaps.flatMap(m => Object.keys(m)))].sort();
      rawDatasets = data.map(({ name }, i) => ({
        label: name,
        data: allWeeks.map(w => weekMaps[i][w] ?? null),
        borderColor: PALETTE[i % PALETTE.length],
        backgroundColor: "transparent",
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, spanGaps: true,
      }));

      const defaultPeriod = PERIODS.find(p => p.label === activePeriod);
      const cutoff = getCutoffDate(defaultPeriod);
      const { labels: initLabels, rebased: initData } = rebaseFromCutoff(allWeeks, rawDatasets, cutoff);

      lineChartInstance = new Chart(document.getElementById("line-chart"), {
        type: "line",
        data: { labels: initLabels, datasets: initData.map((ds, i) => ({ ...rawDatasets[i], data: ds.data })) },
        options: {
          responsive: true,
          interaction: { mode: "nearest", intersect: true },
          plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: "#12121a", borderColor: "#1e1e2e", borderWidth: 1, titleColor: "#5a5a7a", bodyColor: "#e8e8f0", callbacks: { label: ctx => ctx.parsed.y !== null ? ` ${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? "+" : ""}${ctx.parsed.y.toFixed(2)}%` : null } }
          },
          scales: {
            x: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", maxTicksLimit: 8, font: { family: "DM Mono", size: 11 } } },
            y: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", font: { family: "DM Mono", size: 11 }, callback: v => (v >= 0 ? "+" : "") + v + "%" } }
          }
        }
      });

      filtersEl.querySelectorAll(".tf").forEach(btn => {
        btn.addEventListener("click", () => {
          const period = PERIODS.find(p => p.label === btn.dataset.period);
          updateLineChart(period);
        });
      });

      const legend = document.getElementById("legend");
      legend.innerHTML = data.map((d, i) => `
        <div class="legend-item" onclick="toggleLine(${i})">
          <div class="legend-dot" id="dot-${i}" style="background:${PALETTE[i % PALETTE.length]}"></div>
          ${d.name}
        </div>
      `).join("");

      window.toggleLine = (i) => {
        const meta = lineChartInstance.getDatasetMeta(i);
        meta.hidden = !meta.hidden;
        document.getElementById(`dot-${i}`).style.opacity = meta.hidden ? "0.3" : "1";
        lineChartInstance.update();
      };
    }

    load();
  </script>
</body>
</html>
