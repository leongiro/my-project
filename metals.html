<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edelmetalen Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --text: #e8e8f0; --muted: #5a5a7a;
      --pos: #4ade80; --neg: #f87171; --neutral: #60a5fa;
      --gold: #fbbf24; --silver: #94a3b8; --plat: #e2e8f0; --copper: #fb923c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem; }
    nav { display: flex; gap: 0.75rem; margin-bottom: 2rem; align-items: center; flex-wrap: wrap; }
    nav a { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; }
    nav a:hover { color: var(--text); border-color: var(--muted); }
    nav a.active { color: var(--text); border-color: var(--neutral); background: rgba(96,165,250,0.1); }
    header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
    .badge { padding: 5px 14px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge.bullish  { background: rgba(74,222,128,0.15);  color: var(--pos); border: 1px solid rgba(74,222,128,0.4); }
    .badge.bearish  { background: rgba(248,113,113,0.15); color: var(--neg); border: 1px solid rgba(248,113,113,0.4); }
    .badge.neutraal { background: rgba(251,191,36,0.15);  color: #fbbf24;    border: 1px solid rgba(251,191,36,0.4); }
    .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 2rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 1.15rem; font-weight: 500; }
    .stat-sub { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
    .pos { color: var(--pos); } .neg { color: var(--neg); } .neu { color: var(--neutral); }
    .gold-c { color: var(--gold); } .silv-c { color: var(--silver); } .plat-c { color: var(--plat); } .copp-c { color: var(--copper); }
    .global-tf { display: flex; gap: 4px; margin-bottom: 2rem; align-items: center; }
    .global-tf-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-right: 6px; }
    .tf { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .tf:hover { color: var(--text); border-color: var(--muted); }
    .tf.active { background: var(--neutral); border-color: var(--neutral); color: #0a0a0f; font-weight: 600; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .chart-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .chart-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .chart-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
    .chart-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    canvas { width: 100% !important; }
    .ratio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
    .ratio-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .ratio-val { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; }
    .ratio-sub { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .ratio-bar-wrap { background: var(--border); border-radius: 3px; height: 4px; width: 100%; margin-top: 8px; }
    .ratio-bar { height: 4px; border-radius: 3px; }
    .miner-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .miner-table th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border); }
    .miner-table th:first-child { text-align: left; }
    .miner-table td { padding: 8px 10px; text-align: right; border-bottom: 1px solid rgba(30,30,46,0.5); font-family: 'DM Mono', monospace; }
    .miner-table td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; }
    .miner-table tr:hover td { background: rgba(255,255,255,0.02); }
    .junior { color: var(--neutral); font-size: 10px; }
    .senior { color: var(--gold); font-size: 10px; }
    .loading { text-align: center; padding: 6rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .error { color: #f87171; font-family: 'DM Mono', monospace; font-size: 13px; padding: 2rem; text-align: center; }
    @media (max-width: 1100px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <a href="/">📊 YTD Dashboard</a>
    <a href="/macro.html">🌍 Macro</a>
    <a href="/sector.html">🔄 Sector Rotatie</a>
    <a href="/crypto.html">₿ Crypto</a>
    <a href="/metals.html" class="active">🥇 Edelmetalen</a>
    <a href="/commodities.html">⚡ Grondstoffen</a>
  </nav>
  <header>
    <h1>Edelmetalen Dashboard</h1>
    <div class="badge" id="momentum-badge">Laden...</div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)" id="metal-score"></div>
  </header>
  <div class="global-tf" id="global-tf">
    <span class="global-tf-label">Periode:</span>
    <button class="tf" data-days="90">3M</button>
    <button class="tf" data-days="180">6M</button>
    <button class="tf active" data-days="365">1J</button>
    <button class="tf" data-days="730">2J</button>
  </div>
  <div id="content">
    <div class="loading">Data laden<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>
  <script>
    const CHARTS = {};
    let ALL_SERIES = {};
    let activeDays = 365;

    function cutSeries(series, days) {
      if (!series || !series.length) return [];
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - days);
      return series.filter(p => p.date >= cutoff.toISOString().slice(0, 10));
    }

    document.getElementById("global-tf").addEventListener("click", e => {
      if (!e.target.classList.contains("tf")) return;
      document.querySelectorAll(".tf").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      activeDays = parseInt(e.target.dataset.days);
      Object.entries(CHARTS).forEach(([id, { chart, seriesKey }]) => {
        const sliced = cutSeries(ALL_SERIES[seriesKey], activeDays);
        chart.data.labels = sliced.map(p => p.date);
        chart.data.datasets[0].data = sliced.map(p => p.value);
        chart.update();
      });
    });

    function fmt(v, d = 2, pre = "", suf = "") {
      if (v === null || v === undefined) return "—";
      return `${pre}${parseFloat(v).toFixed(d)}${suf}`;
    }
    function pctClass(v) { return v > 0 ? "pos" : v < 0 ? "neg" : "neu"; }
    function deltaClass(series) {
      if (!series || series.length < 20) return "neu";
      const last = series[series.length - 1]?.value;
      const prev = series[series.length - 20]?.value;
      return last > prev ? "pos" : last < prev ? "neg" : "neu";
    }

    function makeChart(canvasId, seriesKey, color, opts = {}) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      const series = cutSeries(ALL_SERIES[seriesKey], activeDays);
      if (!series.length) return;
      const plugins = [];
      if (opts.zones) {
        plugins.push({
          id: "zones-" + canvasId,
          beforeDraw(chart) {
            const { ctx: c, chartArea, scales } = chart;
            if (!chartArea) return;
            opts.zones.forEach(z => {
              const y = scales.y.getPixelForValue(z.val);
              c.save(); c.strokeStyle = z.color; c.lineWidth = 1; c.setLineDash([4, 4]);
              c.beginPath(); c.moveTo(chartArea.left, y); c.lineTo(chartArea.right, y); c.stroke(); c.restore();
            });
          }
        });
      }
      const chart = new Chart(ctx, {
        type: "line", plugins,
        data: {
          labels: series.map(p => p.date),
          datasets: [{ data: series.map(p => p.value), borderColor: color, backgroundColor: opts.fill ? color + "18" : "transparent", fill: opts.fill ?? false, borderWidth: 1.5, pointRadius: 0, tension: 0.3 }]
        },
        options: {
          responsive: true, interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: "#12121a", borderColor: "#1e1e2e", borderWidth: 1, titleColor: "#5a5a7a", bodyColor: "#e8e8f0",
              callbacks: { label: ctx => ` ${opts.prefix ?? ""}${ctx.parsed.y?.toFixed(opts.decimals ?? 2)}${opts.suffix ?? ""}` }
            }
          },
          scales: {
            x: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", maxTicksLimit: 6, font: { family: "DM Mono", size: 10 } } },
            y: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", font: { family: "DM Mono", size: 10 }, callback: v => `${opts.prefix ?? ""}${typeof v === "number" ? v.toFixed(opts.yDec ?? 1) : v}${opts.suffix ?? ""}` } }
          }
        }
      });
      CHARTS[canvasId] = { chart, seriesKey };
    }

    async function load() {
      try {
        const res  = await fetch("/api/metals");
        const json = await res.json();
        if (!json.ok) throw new Error(json.error);
        ALL_SERIES = json.series;
        render(json);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="error">Kon data niet laden: ${err.message}</div>`;
      }
    }

    function render({ momentumSignaal, latest, miners, series }) {
      const badge = document.getElementById("momentum-badge");
      badge.className = `badge ${momentumSignaal}`;
      const mLabels = { bullish: "🟢 Bullish", bearish: "🔴 Bearish", neutraal: "🟡 Neutraal" };
      badge.textContent = mLabels[momentumSignaal];
      document.getElementById("metal-score").textContent = `Score: ${latest.metalScore > 0 ? "+" : ""}${latest.metalScore} / 5`;

      const gsrInterp  = latest.goldSilverRatio > 90 ? "Zilver historisch goedkoop" : latest.goldSilverRatio < 60 ? "Zilver relatief duur" : "Neutraal";
      const platInterp = latest.platGoldRatio < 0.7 ? "Platina historisch goedkoop vs goud" : latest.platGoldRatio > 1.0 ? "Platina duur vs goud" : "Neutraal";
      const gdxInterp  = series.gdxGldRatio.length > 20 && series.gdxGldRatio[series.gdxGldRatio.length-1]?.value > series.gdxGldRatio[series.gdxGldRatio.length-20]?.value ? "Miners outperformen goud — bullish" : "Goud outperformt miners — voorzichtig";

      document.getElementById("content").innerHTML = `
        <div class="stats">
          <div class="stat"><div class="stat-label">Goud</div><div class="stat-value gold-c">$${latest.gold ? latest.gold.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div><div class="stat-sub ${deltaClass(series.gold)}">per troy oz</div></div>
          <div class="stat"><div class="stat-label">Zilver</div><div class="stat-value silv-c">$${fmt(latest.silver, 2)}</div><div class="stat-sub ${deltaClass(series.silver)}">per troy oz</div></div>
          <div class="stat"><div class="stat-label">Platina</div><div class="stat-value plat-c">$${latest.platinum ? latest.platinum.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div><div class="stat-sub ${deltaClass(series.platinum)}">per troy oz</div></div>
          <div class="stat"><div class="stat-label">Palladium</div><div class="stat-value neu">$${latest.palladium ? latest.palladium.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div><div class="stat-sub ${deltaClass(series.palladium)}">per troy oz</div></div>
          <div class="stat"><div class="stat-label">Koper</div><div class="stat-value copp-c">$${fmt(latest.copper, 3)}</div><div class="stat-sub ${deltaClass(series.copper)}">per pound</div></div>
          <div class="stat"><div class="stat-label">TIPS Yield</div><div class="stat-value ${latest.tipsYield < 0 ? "pos" : latest.tipsYield > 2 ? "neg" : "neu"}">${fmt(latest.tipsYield, 2, "", "%")}</div><div class="stat-sub">${latest.tipsYield < 0 ? "Negatief — bullish goud" : latest.tipsYield < 1 ? "Laag — supportief" : "Hoog — tegenwind"}</div></div>
          <div class="stat"><div class="stat-label">Gold/Silver Ratio</div><div class="stat-value gold-c">${fmt(latest.goldSilverRatio, 1)}</div><div class="stat-sub">${gsrInterp}</div></div>
          <div class="stat"><div class="stat-label">Plat/Gold Ratio</div><div class="stat-value plat-c">${fmt(latest.platGoldRatio, 3)}</div><div class="stat-sub">${platInterp}</div></div>
        </div>

        <div class="section-title">Koersen Edelmetalen</div>
        <div class="grid-2">
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">Goud (GC=F)</div><div class="chart-sub">per troy oz</div></div><div class="chart-val gold-c">$${latest.gold ? latest.gold.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div></div>
            <canvas id="gold-chart" height="120"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">Zilver (SI=F)</div><div class="chart-sub">per troy oz</div></div><div class="chart-val silv-c">$${fmt(latest.silver, 2)}</div></div>
            <canvas id="silver-chart" height="120"></canvas>
          </div>
        </div>
        <div class="grid-2">
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">Platina (PL=F)</div><div class="chart-sub">per troy oz</div></div><div class="chart-val plat-c">$${latest.platinum ? latest.platinum.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div></div>
            <canvas id="plat-chart" height="120"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">Palladium (PA=F)</div><div class="chart-sub">per troy oz</div></div><div class="chart-val neu">$${latest.palladium ? latest.palladium.toLocaleString("nl-NL", {maximumFractionDigits:0}) : "—"}</div></div>
            <canvas id="pall-chart" height="120"></canvas>
          </div>
        </div>

        <div class="section-title">Marktratios</div>
        <div class="grid-4">
          <div class="ratio-card"><div class="ratio-name">Gold / Silver Ratio</div><div class="ratio-val gold-c">${fmt(latest.goldSilverRatio, 1)}</div><div class="ratio-sub">${gsrInterp}<br>Historisch gem: ~70</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.goldSilverRatio/120)*100,100)}%;background:var(--gold)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Gold / Oil Ratio</div><div class="ratio-val gold-c">${fmt(latest.goldOilRatio, 2)}</div><div class="ratio-sub">Hoog = goud duur vs energie<br>Historisch gem: ~15-25</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.goldOilRatio/50)*100,100)}%;background:var(--gold)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Silver / Oil Ratio</div><div class="ratio-val silv-c">${fmt(latest.silverOilRatio, 3)}</div><div class="ratio-sub">Industriële vraag indicator<br>Historisch gem: ~0.3-0.5</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.silverOilRatio/1)*100,100)}%;background:var(--silver)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Dow / Silver Ratio</div><div class="ratio-val neu">${fmt(latest.dowSilverRatio, 0)}</div><div class="ratio-sub">Laag = zilver goedkoop vs equities<br>Historisch gem: ~1000-2000</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.dowSilverRatio/4000)*100,100)}%;background:var(--neutral)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Platina / Gold Ratio</div><div class="ratio-val plat-c">${fmt(latest.platGoldRatio, 3)}</div><div class="ratio-sub">${platInterp}<br>Historisch: platina > goud</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.platGoldRatio/2)*100,100)}%;background:var(--plat)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Palladium / Platina</div><div class="ratio-val neu">${fmt(latest.palladPlatRatio, 3)}</div><div class="ratio-sub">Autosector indicator<br>>1 = palladium duur</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.palladPlatRatio/3)*100,100)}%;background:var(--muted)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">Copper / Silver Ratio</div><div class="ratio-val copp-c">${fmt(latest.copperSilverRatio, 4)}</div><div class="ratio-sub">Industriële vraag zilver<br>Stijgend = economische groei</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.copperSilverRatio/0.2)*100,100)}%;background:var(--copper)"></div></div></div>
          <div class="ratio-card"><div class="ratio-name">GDX / GLD Ratio</div><div class="ratio-val ${deltaClass(series.gdxGldRatio)}">${fmt(latest.gdxGldRatio, 4)}</div><div class="ratio-sub">${gdxInterp}</div><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${Math.min((latest.gdxGldRatio/0.5)*100,100)}%;background:var(--gold)"></div></div></div>
        </div>

        <div class="section-title">Ratio Grafieken</div>
        <div class="grid-3">
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Gold / Silver Ratio</div><div class="chart-val gold-c">${fmt(latest.goldSilverRatio, 1)}</div></div><canvas id="gsr-chart" height="120"></canvas></div>
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Gold / Oil Ratio</div><div class="chart-val gold-c">${fmt(latest.goldOilRatio, 2)}</div></div><canvas id="gor-chart" height="120"></canvas></div>
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Dow / Silver Ratio</div><div class="chart-val neu">${fmt(latest.dowSilverRatio, 0)}</div></div><canvas id="dsr-chart" height="120"></canvas></div>
        </div>
        <div class="grid-3">
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Platina / Gold Ratio</div><div class="chart-val plat-c">${fmt(latest.platGoldRatio, 3)}</div></div><canvas id="pgr-chart" height="120"></canvas></div>
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">GDX / GLD — Miner Leverage</div><div class="chart-val ${deltaClass(series.gdxGldRatio)}">${fmt(latest.gdxGldRatio, 4)}</div></div><canvas id="gdxgld-chart" height="120"></canvas></div>
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">GDXJ / GDX — Junior vs Senior</div><div class="chart-val ${deltaClass(series.gdxjGdxRatio)}">${fmt(latest.gdxjGdxRatio, 3)}</div></div><canvas id="gdxjgdx-chart" height="120"></canvas></div>
        </div>

        <div class="section-title">Fysieke Vraag Proxies</div>
        <div class="grid-3">
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">PSLV/SLV Ratio — Fysiek Zilver Premium</div><div class="chart-sub">Hogere ratio = meer vraag fysiek zilver</div></div><div class="chart-val ${deltaClass(series.pslvSlvRatio)}">${fmt(latest.pslvSlvRatio, 4)}</div></div>
            <canvas id="pslv-chart" height="120"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">Shanghai Premium Proxy</div><div class="chart-sub">Zilver × CNY/USD — stijgend = Chinese druk</div></div><div class="chart-val ${deltaClass(series.shanghaiProxy)}">${fmt(latest.shanghaiProxy, 0)}</div></div>
            <canvas id="shanghai-chart" height="120"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-top"><div><div class="chart-title">10Y TIPS Real Yield</div><div class="chart-sub">Negatief = bullish edelmetalen</div></div><div class="chart-val ${latest.tipsYield < 0 ? "pos" : latest.tipsYield > 2 ? "neg" : "neu"}">${fmt(latest.tipsYield, 2, "", "%")}</div></div>
            <canvas id="tips-chart" height="120"></canvas>
          </div>
        </div>

        <div class="section-title">Miners — Senior vs Junior</div>
        <div class="grid-2">
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Gold Miners — GDX vs GDXJ</div></div><canvas id="goldminers-chart" height="140"></canvas></div>
          <div class="chart-wrap"><div class="chart-top"><div class="chart-title">Silver Miners — SIL vs SILJ</div></div><canvas id="silverminers-chart" height="140"></canvas></div>
        </div>

        <div class="chart-wrap" style="margin-bottom:1.25rem;overflow-x:auto">
          <table class="miner-table">
            <thead><tr><th>ETF</th><th>Type</th><th>Prijs</th><th>YTD</th><th>1M</th><th>3M</th></tr></thead>
            <tbody>
              ${miners.map(m => `
                <tr>
                  <td><strong>${m.symbol}</strong><span style="color:var(--muted);font-size:11px;margin-left:6px">${m.name}</span></td>
                  <td><span class="${m.type}">${m.type} / ${m.metal}</span></td>
                  <td>$${fmt(m.last, 2)}</td>
                  <td class="${pctClass(m.ytd)}">${fmt(m.ytd, 2, m.ytd >= 0 ? "+" : "", "%")}</td>
                  <td class="${pctClass(m.pct1m)}">${fmt(m.pct1m, 2, m.pct1m >= 0 ? "+" : "", "%")}</td>
                  <td class="${pctClass(m.pct3m)}">${fmt(m.pct3m, 2, m.pct3m >= 0 ? "+" : "", "%")}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>

        <div class="section-title">Momentum Score Breakdown</div>
        <div class="chart-wrap" style="display:flex;align-items:center;gap:3rem;flex-wrap:wrap">
          <div style="text-align:center">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">Score</div>
            <div style="font-family:'DM Mono',monospace;font-size:3rem;font-weight:500;color:${latest.metalScore >= 2 ? 'var(--pos)' : latest.metalScore <= -2 ? 'var(--neg)' : '#fbbf24'}">
              ${latest.metalScore > 0 ? "+" : ""}${latest.metalScore}
            </div>
          </div>
          <div style="font-size:11px;color:var(--muted);line-height:2">
            TIPS Real Yield ${latest.tipsYield < 0 ? "✅ Negatief — bullish" : latest.tipsYield < 1 ? "⚠️ Laag — supportief" : "❌ Hoog — tegenwind"}<br>
            Gold/Silver Ratio ${series.goldSilverRatio.length > 20 && series.goldSilverRatio[series.goldSilverRatio.length-1]?.value < series.goldSilverRatio[series.goldSilverRatio.length-20]?.value ? "✅ Dalend — zilver outperformt" : "❌ Stijgend — goud outperformt"}<br>
            GDX/GLD Ratio ${series.gdxGldRatio.length > 20 && series.gdxGldRatio[series.gdxGldRatio.length-1]?.value > series.gdxGldRatio[series.gdxGldRatio.length-20]?.value ? "✅ Stijgend — miners leiden" : "❌ Dalend — goud leidt"}<br>
            GDXJ/GDX Ratio ${series.gdxjGdxRatio.length > 20 && series.gdxjGdxRatio[series.gdxjGdxRatio.length-1]?.value > series.gdxjGdxRatio[series.gdxjGdxRatio.length-20]?.value ? "✅ Juniors leiden — risk on" : "❌ Seniors leiden — defensief"}<br>
            Platina/Gold ${latest.platGoldRatio < 0.7 ? "✅ Platina goedkoop — koopkans" : "⚠️ Neutraal"}
          </div>
        </div>
      `;

      makeChart("gold-chart",   "gold",      "#fbbf24", { prefix: "$", decimals: 0, yDec: 0, fill: true });
      makeChart("silver-chart", "silver",    "#94a3b8", { prefix: "$", decimals: 2, yDec: 2, fill: true });
      makeChart("plat-chart",   "platinum",  "#e2e8f0", { prefix: "$", decimals: 0, yDec: 0 });
      makeChart("pall-chart",   "palladium", "#60a5fa", { prefix: "$", decimals: 0, yDec: 0 });
      makeChart("gsr-chart",      "goldSilverRatio",  "#fbbf24", { decimals: 1, yDec: 0, zones: [{ val: 70, color: "rgba(96,165,250,0.4)" }, { val: 90, color: "rgba(74,222,128,0.4)" }] });
      makeChart("gor-chart",      "goldOilRatio",     "#fbbf24", { decimals: 2, yDec: 1 });
      makeChart("dsr-chart",      "dowSilverRatio",   "#60a5fa", { decimals: 0, yDec: 0 });
      makeChart("pgr-chart",      "platGoldRatio",    "#e2e8f0", { decimals: 3, yDec: 3, zones: [{ val: 1.0, color: "rgba(96,165,250,0.4)" }, { val: 0.7, color: "rgba(74,222,128,0.4)" }] });
      makeChart("gdxgld-chart",   "gdxGldRatio",      "#fbbf24", { decimals: 4, yDec: 4 });
      makeChart("gdxjgdx-chart",  "gdxjGdxRatio",     "#60a5fa", { decimals: 3, yDec: 3 });
      makeChart("pslv-chart",     "pslvSlvRatio",     "#34d399", { decimals: 4, yDec: 4 });
      makeChart("shanghai-chart", "shanghaiProxy",    "#f472b6", { decimals: 0, yDec: 0 });
      makeChart("tips-chart",     "tips10y",          "#4ade80", { suffix: "%", decimals: 2, yDec: 2, zones: [{ val: 0, color: "rgba(74,222,128,0.4)" }] });

      function makeDualChart(canvasId, s1Key, s2Key, name1, name2, color1, color2) {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        const s1 = cutSeries(ALL_SERIES[s1Key], activeDays);
        const s2 = cutSeries(ALL_SERIES[s2Key], activeDays);
        if (!s1.length) return;
        new Chart(ctx, {
          type: "line",
          data: {
            labels: s1.map(p => p.date),
            datasets: [
              { label: name1, data: s1.map(p => p.value), borderColor: color1, backgroundColor: "transparent", borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
              { label: name2, data: s2.map(p => p.value), borderColor: color2, backgroundColor: "transparent", borderWidth: 1.5, pointRadius: 0, tension: 0.3, borderDash: [4,3] },
            ]
          },
          options: {
            responsive: true, interaction: { mode: "index", intersect: false },
            plugins: { legend: { labels: { color: "#5a5a7a", font: { family: "DM Mono", size: 10 } } }, tooltip: { backgroundColor: "#12121a", borderColor: "#1e1e2e", borderWidth: 1, titleColor: "#5a5a7a", bodyColor: "#e8e8f0" } },
            scales: {
              x: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", maxTicksLimit: 6, font: { family: "DM Mono", size: 10 } } },
              y: { grid: { color: "#1e1e2e" }, ticks: { color: "#5a5a7a", font: { family: "DM Mono", size: 10 }, callback: v => "$" + v.toFixed(2) } }
            }
          }
        });
      }

      makeDualChart("goldminers-chart",   "gdx",  "gdxj", "GDX (senior)",  "GDXJ (junior)", "#fbbf24", "#fb923c");
      makeDualChart("silverminers-chart", "sil",  "silj", "SIL (senior)",  "SILJ (junior)", "#94a3b8", "#60a5fa");
    }

    load();
  </script>
</body>
</html>
